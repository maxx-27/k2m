<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            display: inline-block;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            vertical-align: middle;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Masuk - Toko Swalayan K2M</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Header / Top Navigation -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white dark:bg-background-dark">
                <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
                    <div class="text-primary">
                        <span class="material-symbols-outlined text-4xl">storefront</span>
                    </div>
                    <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Toko
                        Swalayan K2M</h2>
                </div>
                <a class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100"
                    href="javascript:history.back()">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
            </header>
            <main class="flex-1 flex justify-center py-10 px-4">
                <div class="layout-content-container flex flex-col max-w-[480px] w-full gap-8">
                    <!-- Brand Identity -->
                    <div class="flex flex-col items-center text-center gap-4 py-4">
                        <div
                            class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center text-primary mb-2">
                            <span class="material-symbols-outlined text-4xl">shopping_basket</span>
                        </div>
                        <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight">Selamat Datang
                            Kembali!</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-sm font-normal px-4">
                            Masuk untuk melanjutkan belanja Anda dengan harga rasa grosir di K2M Swalayan.
                        </p>
                    </div>
                    <!-- Login Form -->
                    <!-- Note: Redirection directly to admin dashboard per user request -->
                    <form class="flex flex-col gap-5"
                        onsubmit="event.preventDefault(); window.location.href='admin-pengaturan.html';">
                        <!-- Email/Phone -->
                        <label class="flex flex-col gap-2">
                            <span class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Email atau
                                Nomor HP</span>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
                                <input
                                    class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm"
                                    placeholder="Masukkan kontak Anda" required="" type="text" />
                            </div>
                        </label>
                        <!-- Password -->
                        <label class="flex flex-col gap-2 relative">
                            <span class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-normal">Kata
                                Sandi</span>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
                                <input
                                    class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-12 pr-12 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm"
                                    placeholder="••••••••" required="" type="password" />
                                <button
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors"
                                    type="button">
                                    <span class="material-symbols-outlined">visibility_off</span>
                                </button>
                            </div>
                            <a class="text-primary text-xs font-semibold hover:underline absolute right-0 -top-6"
                                href="#">Lupa kata sandi?</a>
                        </label>
                        <!-- Remember Me -->
                        <label class="flex items-center gap-3 py-1 cursor-pointer w-fit mt-1">
                            <input
                                class="h-5 w-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-900"
                                type="checkbox" />
                            <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Ingat perangkat
                                ini</span>
                        </label>
                        <!-- Submit Button -->
                        <button
                            class="flex w-full items-center justify-center rounded-xl h-14 bg-primary text-white font-bold text-lg shadow-lg hover:bg-primary/90 hover:shadow-primary/25 hover:-translate-y-0.5 transition-all mt-4"
                            type="submit">
                            Masuk
                        </button>
                    </form>
                    <!-- Divider -->
                    <div class="flex items-center justify-center gap-4 mt-2">
                        <div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
                        <span
                            class="text-slate-400 dark:text-slate-500 text-xs font-medium uppercase tracking-wider text-center">Atau
                            masuk dengan</span>
                        <div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
                    </div>
                    <!-- Social Login -->
                    <div class="grid grid-cols-2 gap-4">
                        <button
                            class="flex items-center justify-center gap-2 h-12 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 shadow-sm transition-colors">
                            <img alt="Google Icon" class="w-5 h-5" src="https://www.google.com/favicon.ico" />
                            Google
                        </button>
                        <button
                            class="flex items-center justify-center gap-2 h-12 rounded-xl border border-slate-200 dark:border-slate-800 bg-[#1877F2] text-white font-bold hover:bg-[#1877F2]/90 shadow-sm transition-colors">
                            <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                                </path>
                            </svg>
                            Facebook
                        </button>
                    </div>
                    <!-- Register Link -->
                    <div class="flex flex-col items-center gap-2 py-6">
                        <p class="text-slate-600 dark:text-slate-400 text-sm">Belum menjadi pelanggan kami?</p>
                        <button class="text-primary font-bold hover:underline"
                            onclick="window.location.href='daftar.html'">
                            Daftar Akun Baru Sekarang
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
